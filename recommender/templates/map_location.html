{% extends "base.html" %}
{% load translation_tags %}
{% block title %}{% tr "Map Location" %}{% endblock %}
{% block content %}
<div class="card panel-card shadow-sm border-0">
    <div class="card-body">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 mb-4">
            <div>
                <h3 class="mb-1"><i class="fa-solid fa-map-location-dot"></i> {% tr "Location Finder" %}</h3>
                <p class="text-muted mb-0">{% tr "Select your field location to improve local weather and soil recommendations." %}</p>
            </div>
            <a href="{% url 'profile' %}" class="btn btn-outline-success btn-sm"><i class="fa-solid fa-user-pen me-1"></i> {% tr "My Profile" %}</a>
        </div>
        <div id="map" class="rounded-4 overflow-hidden" style="height: 420px;"></div>
        <div class="row g-3 mt-3">
            <div class="col-md-8">
                <input type="text" id="locationInput" class="form-control" placeholder="{% tr "Selected location will appear here" %}" readonly>
            </div>
            <div class="col-md-4 d-grid">
                <button class="btn btn-success" type="button" onclick="getCurrentLocation()"><i class="fa-solid fa-location-crosshairs me-2"></i> {% tr "Use My Location" %}</button>
            </div>
        </div>
    </div>
</div>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([27.7172, 85.3240], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);
const marker = L.marker([27.7172, 85.3240]).addTo(map);
map.on('click', function(e) {
    const latlng = e.latlng;
    marker.setLatLng(latlng);
    document.getElementById('locationInput').value = `Lat: ${latlng.lat.toFixed(4)}, Lng: ${latlng.lng.toFixed(4)}`;
});
function getCurrentLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            map.setView([lat, lng], 12);
            marker.setLatLng([lat, lng]);
            document.getElementById('locationInput').value = `Lat: ${lat.toFixed(4)}, Lng: ${lng.toFixed(4)}`;
        });
    }
}
</script>
{% endblock %}
